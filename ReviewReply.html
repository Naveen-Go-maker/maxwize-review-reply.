const Toast = ({ msg, type, onClose }) => {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: "fixed", bottom: 32, right: 32, background: type === "success" ? COLORS.green : COLORS.accent, color: "#fff", padding: "12px 20px", borderRadius: 10, fontWeight: 600, fontSize: 14, zIndex: 9999, boxShadow: "0 8px 32px rgba(0,0,0,0.4)", display: "flex", alignItems: "center", gap: 10 }}>
      <span>{type === "success" ? "✓" : "✦"}</span> {msg}
    </div>
  );
};

    if (filterStatus !== "all" && r.status !== filterStatus) return false;
    if (filterLocation !== "all" && r.location !== filterLocation) return false;
    if (searchQ && !r.reviewer.toLowerCase().includes(searchQ.toLowerCase()) && !r.text.toLowerCase().includes(searchQ.toLowerCase())) return false;
    return true;
  });

    total: reviews.length,
    pending: reviews.filter(r => r.status === "pending").length,
    responded: reviews.filter(r => r.status === "responded").length,
    avgRating: (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1),
    responseRate: Math.round((reviews.filter(r => r.status === "responded").length / reviews.length) * 100),

    setSelectedReview(review);
    setActiveVariant(0);
    setEditedResponse(AI_RESPONSES[review.id]?.[0] || "AI response will appear here...");
  };

    if (plan === "Free" && usageCount >= planData.replies) {
      showToast("Monthly limit reached. Upgrade to Pro for 100 replies/month.", "info");
      return;
    }
    setGenerating(true);
    await new Promise(r => setTimeout(r, 1800));
    setGenerating(false);
    setUsageCount(u => u + 1);
    showToast("3 AI response variants generated!");

    setPosting(true);

                      <textarea value={editedResponse} onChange={e => setEditedResponse(e.target.value)} rows={8}
                        style={{ width: "100%", background: COLORS.bg, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "14px", color: COLORS.textPrimary, fontSize: 14, lineHeight: 1.6, resize: "vertical", boxSizing: "border-box", fontFamily: "system-ui" }} />
                      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                        <span style={{ fontSize: 11, color: editedResponse.length > 500 ? COLORS.amber : COLORS.textMuted, fontFamily: "system-ui" }}>{editedResponse.length} chars</span>
                        <span style={{ fontSize: 11, color: COLORS.textMuted, fontFamily: "system-ui" }}>Powered by Claude AI</span>
                      </div>
                    </>
                  )}
                </div>

                {/* Action buttons */}
                {selectedReview.status === "pending" && (
                  <div style={{ display: "flex", gap: 12 }}>
                    <button onClick={handlePost} disabled={posting}
                      onMouseEnter={() => setHovBtn("post")} onMouseLeave={() => setHovBtn(null)}
                      style={{ flex: 1, background: posting ? COLORS.green : (hovBtn === "post" ? "#16a34a" : COLORS.green), border: "none", color: "#fff", padding: "14px", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: "pointer", opacity: posting ? 0.75 : 1, boxShadow: posting ? "none" : SHADOW.green, transition: "background 0.15s, transform 0.1s, box-shadow 0.15s", transform: hovBtn === "post" && !posting ? "translateY(-1px)" : "none" }}>
                      {posting ? "Posting to Google..." : "✓ Approve & Post to Google"}
                    </button>
                    <button onClick={handleSkip}
                      onMouseEnter={() => setHovBtn("skip")} onMouseLeave={() => setHovBtn(null)}
                      style={{ background: hovBtn === "skip" ? COLORS.surfaceHover : "transparent", border: `1px solid ${hovBtn === "skip" ? COLORS.borderHover : COLORS.border}`, color: COLORS.textSecondary, padding: "14px 20px", borderRadius: 10, fontSize: 15, cursor: "pointer", transition: "background 0.15s, border-color 0.15s" }}>Skip</button>
                  </div>
                )}
                {selectedReview.status === "responded" && (
                  <div style={{ background: "rgba(34,197,94,0.08)", border: `1px solid rgba(34,197,94,0.2)`, borderRadius: 10, padding: 16, textAlign: "center", color: COLORS.green, fontWeight: 600 }}>✓ Response posted to Google</div>
                )}
                {selectedReview.status === "skipped" && (
                  <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 16, textAlign: "center", color: COLORS.textSecondary }}>This review was skipped</div>
                )}
              </div>
            )}
          </div>
        )}

        {/* LOCATIONS PAGE */}
        {activeNav === "locations" && (
          <div style={{ padding: 32 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 28 }}>
              <div>
                <h2 style={{ fontSize: 24, fontWeight: 700, fontFamily: "Georgia", marginBottom: 4 }}>Locations</h2>
                <p style={{ color: COLORS.textSecondary, fontSize: 14 }}>Manage your connected Google Business Profile locations</p>
              </div>
              <button style={{ background: COLORS.accent, border: "none", color: "#fff", padding: "10px 20px", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>+ Add Location</button>
            </div>
            <div style={{ display: "grid", gap: 16 }}>
              {[
                { name: "The Spice Garden - MG Road", addr: "12, Brigade Road, MG Road, Bangalore 560001", cat: "Restaurant", reviews: 45, avg: "4.2", resp: "78%", status: "active" },
                { name: "Glow Skin Clinic - Koramangala", addr: "56, 5th Block, Koramangala, Bangalore 560095", cat: "Skin Clinic", reviews: 23, avg: "4.6", resp: "91%", status: "active" },
                { name: "FitZone Gym - Whitefield", addr: "ITPL Main Road, Whitefield, Bangalore 560066", cat: "Fitness Studio", reviews: 67, avg: "3.8", resp: "52%", status: "active" },
              ].map((loc) => (
                <div key={loc.name} style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 14, padding: 24, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                    <div style={{ width: 48, height: 48, borderRadius: 12, background: COLORS.accentGlow, border: `1px solid rgba(79,142,247,0.2)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>📍</div>
                    <div>
                      <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>{loc.name}</div>
                      <div style={{ fontSize: 13, color: COLORS.textSecondary, marginBottom: 4 }}>{loc.addr}</div>
                      <span style={{ fontSize: 11, color: COLORS.accent, background: "rgba(79,142,247,0.1)", padding: "2px 8px", borderRadius: 4 }}>{loc.cat}</span>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 32, flexWrap: "wrap" }}>
                    {[["Reviews", loc.reviews], ["Avg Rating", `${loc.avg}★`], ["Response Rate", loc.resp]].map(([label, val]) => (
                      <div key={label} style={{ textAlign: "center" }}>
                        <div style={{ fontSize: 20, fontWeight: 700 }}>{val}</div>
                        <div style={{ fontSize: 12, color: COLORS.textSecondary }}>{label}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <button style={{ background: "transparent", border: `1px solid ${COLORS.border}`, color: COLORS.textSecondary, padding: "8px 16px", borderRadius: 8, fontSize: 13, cursor: "pointer" }}>Configure</button>
                    <div style={{ background: "rgba(34,197,94,0.1)", border: `1px solid rgba(34,197,94,0.2)`, color: COLORS.green, padding: "8px 14px", borderRadius: 8, fontSize: 12, fontWeight: 600 }}>Active</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* BRAND VOICE PAGE */}
        {activeNav === "brandvoice" && (
          <div style={{ padding: 32, maxWidth: 720 }}>
            <h2 style={{ fontSize: 24, fontWeight: 700, fontFamily: "Georgia", marginBottom: 4 }}>Brand Voice</h2>
            <p style={{ color: COLORS.textSecondary, fontSize: 14, marginBottom: 32 }}>Customize how AI writes responses for your business</p>

            <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 14, padding: 28, marginBottom: 20 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 20 }}>Response Tone</h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10 }}>
                {[
                  { key: "professional", label: "Professional", desc: "Formal, polished, business-appropriate" },
                  { key: "warm", label: "Warm & Friendly", desc: "Personal, caring, approachable" },
                  { key: "casual", label: "Casual", desc: "Relaxed, conversational, laid-back" },
                  { key: "formal", label: "Formal", desc: "Structured, respectful, traditional" },
                ].map(({ key, label, desc }) => (
                  <div key={key} onClick={() => setBrandVoice(v => ({ ...v, tone: key }))} style={{ padding: 16, border: `1px solid ${brandVoice.tone === key ? COLORS.accent : COLORS.border}`, borderRadius: 10, cursor: "pointer", background: brandVoice.tone === key ? "rgba(79,142,247,0.06)" : "transparent" }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: brandVoice.tone === key ? COLORS.accent : COLORS.textPrimary, marginBottom: 4 }}>{label}</div>
                    <div style={{ fontSize: 12, color: COLORS.textSecondary }}>{desc}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 14, padding: 28, marginBottom: 20 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 20 }}>Sign-off & Owner Details</h3>
              <div style={{ marginBottom: 16 }}>
                <label style={{ fontSize: 13, color: COLORS.textSecondary, display: "block", marginBottom: 8 }}>Sign-off text</label>
                <textarea value={brandVoice.signoff} onChange={e => setBrandVoice(v => ({ ...v, signoff: e.target.value }))} rows={2} style={{ width: "100%", background: COLORS.bg, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "10px 14px", color: COLORS.textPrimary, fontSize: 13, resize: "vertical", boxSizing: "border-box", fontFamily: "system-ui" }} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 16, borderTop: `1px solid ${COLORS.border}` }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 500 }}>Include owner name in responses</div>
                  <div style={{ fontSize: 12, color: COLORS.textMuted }}>AI will sign off with the owner's name</div>
                </div>
                <div onClick={() => setBrandVoice(v => ({ ...v, ownerName: !v.ownerName }))} style={{ width: 44, height: 24, borderRadius: 12, background: brandVoice.ownerName ? COLORS.accent : COLORS.border, cursor: "pointer", position: "relative", transition: "background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s, opacity 0.2s" }}>
                  <div style={{ width: 18, height: 18, borderRadius: "50%", background: "#fff", position: "absolute", top: 3, left: brandVoice.ownerName ? 23 : 3, transition: "background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s, opacity 0.2s" }} />
                </div>
              </div>
            </div>

            <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 14, padding: 28, marginBottom: 24 }}>
              <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 8 }}>Custom Instructions</h3>
              <p style={{ fontSize: 13, color: COLORS.textSecondary, marginBottom: 16 }}>Tell the AI specific things to always include or avoid in responses</p>
              <textarea value={brandVoice.instructions} onChange={e => setBrandVoice(v => ({ ...v, instructions: e.target.value }))} rows={4} placeholder={'Example: "Always mention our free parking. Never offer discounts in public replies. Our best dish is the Butter Chicken."'} style={{ width: "100%", background: COLORS.bg, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "12px 14px", color: COLORS.textPrimary, fontSize: 13, resize: "vertical", boxSizing: "border-box", fontFamily: "system-ui" }} />
            </div>

            <button onClick={() => showToast("Brand voice settings saved!")} style={{ background: COLORS.accent, border: "none", color: "#fff", padding: "13px 32px", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: "pointer" }}>Save Brand Voice</button>
          </div>
        )}

        {/* NOTIFICATIONS PAGE */}
        {activeNav === "notifications" && (
          <div style={{ padding: 32, maxWidth: 600 }}>
            <h2 style={{ fontSize: 24, fontWeight: 700, fontFamily: "Georgia", marginBottom: 4 }}>Notifications</h2>
            <p style={{ color: COLORS.textSecondary, fontSize: 14, marginBottom: 32 }}>Stay on top of your reviews with smart alerts</p>
            {[
              { label: "Email notifications", sub: "Receive an email when new reviews arrive", key: "email", alwaysFree: true },
              { label: "WhatsApp alerts for negative reviews", sub: "Instant WhatsApp message for 1-2 star reviews", key: "whatsapp", pro: true },
              { label: "Weekly summary email", sub: "Monday morning digest: new reviews, responses, avg rating", key: "weekly", pro: true },
            ].map(({ label, sub, key, pro }) => (
              <div key={key} style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 20, marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontSize: 14, fontWeight: 600 }}>{label}</span>
                    {pro && plan === "Free" && <span style={{ fontSize: 10, color: COLORS.amber, background: "rgba(245,158,11,0.1)", padding: "2px 6px", borderRadius: 4, fontWeight: 700 }}>PRO</span>}
                  </div>
                  <div style={{ fontSize: 12, color: COLORS.textSecondary }}>{sub}</div>
                </div>
                <div onClick={() => { if (pro && plan === "Free") { showToast("Upgrade to Pro to enable WhatsApp & weekly digest", "info"); return; } setNotifSettings(n => ({ ...n, [key]: !n[key] })); }} style={{ width: 44, height: 24, borderRadius: 12, background: notifSettings[key] && !(pro && plan === "Free") ? COLORS.accent : COLORS.border, cursor: "pointer", position: "relative", transition: "background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s, opacity 0.2s", opacity: pro && plan === "Free" ? 0.4 : 1 }}>
                  <div style={{ width: 18, height: 18, borderRadius: "50%", background: "#fff", position: "absolute", top: 3, left: notifSettings[key] && !(pro && plan === "Free") ? 23 : 3, transition: "background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s, opacity 0.2s" }} />
                </div>
              </div>
            ))}
            {/* WhatsApp number input — shown when WhatsApp enabled & Pro */}
            {notifSettings.whatsapp && plan !== "Free" && (
              <div style={{ background: COLORS.surface, border: `1px solid rgba(34,197,94,0.2)`, borderRadius: 12, padding: 20, marginBottom: 12, boxShadow: SHADOW.green }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                  <span style={{ fontSize: 18 }}>📲</span>
                  <span style={{ fontSize: 14, fontWeight: 600 }}>WhatsApp number</span>
                  <span style={{ fontSize: 10, color: COLORS.green, background: COLORS.greenGlow, padding: "2px 7px", borderRadius: 4, fontWeight: 700 }}>ACTIVE</span>
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <input
                    value={whatsappNumber}
                    onChange={e => setWhatsappNumber(e.target.value)}
                    placeholder="+91 98765 43210"
                    style={{ flex: 1, background: COLORS.bg, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "10px 14px", color: COLORS.textPrimary, fontSize: 14, fontFamily: "system-ui", outline: "none" }}
                  />
                  <button onClick={() => showToast("WhatsApp number updated!")}
                    style={{ background: COLORS.green, border: "none", color: "#fff", padding: "10px 18px", borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer", boxShadow: SHADOW.green }}>
                    Save
                  </button>
                </div>
                <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 8, fontFamily: "system-ui" }}>1–2 star reviews trigger an instant WhatsApp alert to this number with a direct respond link.</div>
              </div>
            )}

            <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 20, marginTop: 12 }}>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>Email threshold for alerts</div>
              {["All reviews", "Only negative (1-2 stars)", "Daily digest only"].map(opt => (
                <div key={opt} onClick={() => setNotifSettings(n => ({ ...n, threshold: opt.toLowerCase().replace(/ /g, "_") }))} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", cursor: "pointer" }}>
                  <div style={{ width: 16, height: 16, borderRadius: "50%", border: `2px solid ${notifSettings.threshold === opt.toLowerCase().replace(/ /g, "_") ? COLORS.accent : COLORS.border}`, background: notifSettings.threshold === opt.toLowerCase().replace(/ /g, "_") ? COLORS.accent : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {notifSettings.threshold === opt.toLowerCase().replace(/ /g, "_") && <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#fff" }} />}
                  </div>
                  <span style={{ fontSize: 13, color: COLORS.textPrimary }}>{opt}</span>
                </div>
              ))}
            </div>
            <button onClick={() => showToast("Notification settings saved!")} style={{ marginTop: 24, background: COLORS.accent, border: "none", color: "#fff", padding: "13px 32px", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: "pointer" }}>Save Settings</button>
          </div>
        )}

        {/* BILLING PAGE */}
        {activeNav === "billing" && (
          <div style={{ padding: 32 }}>
            <h2 style={{ fontSize: 24, fontWeight: 700, fontFamily: "Georgia", marginBottom: 4 }}>Billing & Plan</h2>
            <p style={{ color: COLORS.textSecondary, fontSize: 14, marginBottom: 32 }}>Manage your subscription and usage</p>

            {/* Current plan */}
            <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 14, padding: 24, marginBottom: 24 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>Current Plan: <span style={{ color: COLORS.accent }}>{plan}</span></div>
                  <div style={{ fontSize: 13, color: COLORS.textSecondary }}>{usageCount} / {planData.replies} AI replies used this month</div>
                </div>
                <div style={{ fontSize: 28, fontWeight: 700 }}>${planData.price}<span style={{ fontSize: 14, color: COLORS.textSecondary }}>/mo</span></div>
              </div>
              <div style={{ height: 8, background: COLORS.bg, borderRadius: 4, margin: "16px 0" }}>
                <div style={{ height: "100%", borderRadius: 4, background: COLORS.accent, width: `${Math.min(100, (usageCount / (typeof planData.replies === "number" ? planData.replies : 999)) * 100)}%`, transition: "width 0.3s" }} />
              </div>
            </div>

            {/* Plan cards */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
              {PLANS.map((p, i) => (
                <div key={p.name} style={{ background: p.name === plan ? "rgba(79,142,247,0.06)" : COLORS.surface, border: `1px solid ${p.name === plan ? COLORS.accent : COLORS.border}`, borderRadius: 14, padding: 24 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>{p.name}</div>
                  <div style={{ fontSize: 28, fontWeight: 700, marginBottom: 16 }}>${p.price}<span style={{ fontSize: 14, color: COLORS.textSecondary }}>/mo</span></div>
                  {[`${p.replies} AI replies`, `${p.locations} location(s)`, `${p.variants} variant(s)`, p.languages ? "All languages" : "English only", p.whatsapp ? "WhatsApp alerts" : "Email only"].map(f => (
                    <div key={f} style={{ fontSize: 12, color: COLORS.textSecondary, marginBottom: 6, display: "flex", gap: 6 }}><span style={{ color: COLORS.green }}>✓</span>{f}</div>
                  ))}
                  <button onClick={() => { setPlan(p.name); showToast(`Switched to ${p.name} plan!`); }} style={{ width: "100%", marginTop: 16, background: p.name === plan ? "transparent" : COLORS.accent, border: `1px solid ${p.name === plan ? COLORS.border : COLORS.accent}`, color: p.name === plan ? COLORS.textSecondary : "#fff", padding: "10px", borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                    {p.name === plan ? "Current Plan" : `Switch to ${p.name}`}
                  </button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(ReviewReply));
  </script>
</body>
</html>
